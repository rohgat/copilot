<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Copilot</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="topbar-brand">Co<span>pilot</span></div>
  <div class="status-pill">
    <span class="status-dot idle" id="status-dot"></span>
    <span id="status-text">Idle</span>
  </div>
  <span class="wa-badge offline" id="wa-badge">WhatsApp</span>
  <div class="topbar-actions">
    <button class="btn btn-primary" id="btn-start" onclick="startMeeting()">Start Listening</button>
    <button class="btn btn-danger" id="btn-stop" style="display:none" onclick="stopMeeting()">Stop Meeting</button>
    <button class="btn btn-ghost" onclick="requestCatchup()" id="btn-catchup" style="display:none">Catch-up</button>
  </div>
</div>

<!-- LAYOUT -->
<div class="layout">

  <!-- SIDEBAR: Today's meetings -->
  <div class="sidebar">
    <div class="sidebar-section" style="flex:1;overflow-y:auto">
      <div class="sidebar-label">Today's Meetings</div>
      <div id="meetings-list"><div class="no-meetings">Loading calendar…</div></div>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-label">Upload File</div>
      <div class="upload-zone" id="upload-zone" onclick="document.getElementById('file-input').click()"
           ondragover="event.preventDefault();this.classList.add('drag-over')"
           ondragleave="this.classList.remove('drag-over')"
           ondrop="handleFileDrop(event)">
        <input type="file" id="file-input" multiple onchange="uploadFiles(this.files)">
        <p>Drop files here or <strong>click to upload</strong></p>
        <p style="margin-top:4px;font-size:10px">PDF, DOCX, TXT — pre-meeting docs</p>
      </div>
      <div class="file-list" id="file-list"></div>
    </div>
  </div>

  <!-- CONTENT -->
  <div class="content">
    <div class="tabs">
      <div class="tab active" onclick="switchTab('live')">Live</div>
      <div class="tab" onclick="switchTab('history')">History</div>
    </div>

    <!-- LIVE TAB -->
    <div class="panel active" id="tab-live">
      <div class="live-grid">
        <div>
          <div style="margin-bottom:10px;display:flex;align-items:center;gap:10px">
            <div style="font-size:11px;color:var(--t3);font-family:var(--mono);text-transform:uppercase;letter-spacing:.12em">Transcript</div>
            <span id="meeting-title-live" style="font-size:12px;color:var(--t2)"></span>
          </div>
          <div class="transcript-feed" id="transcript-feed">
            <div class="empty-transcript" id="transcript-empty">
              Start a meeting to see the live transcript
            </div>
          </div>
        </div>
        <div>
          <div style="margin-bottom:10px;font-size:11px;color:var(--t3);font-family:var(--mono);text-transform:uppercase;letter-spacing:.12em">Triggers <span id="trigger-count" style="color:var(--amber)"></span></div>
          <div class="notif-feed" id="notif-feed"></div>
        </div>
      </div>
    </div>

    <!-- HISTORY TAB -->
    <div class="panel" id="tab-history">
      <div class="hist-list" id="history-list">
        <div style="color:var(--t3);font-size:12px">Loading meeting history…</div>
      </div>
    </div>
  </div>
</div>

<script src="/static/app.js"></script>
</body>
</html>
